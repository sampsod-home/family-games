<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Quest Rewards</title>
  <meta name="theme-color" content="#FFF8EF">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FFF8EF;
      --accent: #FF8A3D;
      --accent-dark: #D9642A;
      --ink: #28324E;
      --muted: #8A93AC;
      --shadow: #E8DCC8;
      --track: #F0E7D8;
      --green: #3BB273;
      --green-dark: #2A8354;
      --red: #E4573D;
    }
    * { box-sizing: border-box; touch-action: manipulation; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: Nunito, sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }
    .screen { width: 100%; max-width: 640px; display: flex; flex-direction: column; gap: 22px; }
    .back-btn {
      align-self: flex-start;
      background: #FFFFFF;
      border: 3px solid var(--ink);
      border-radius: 12px;
      padding: 8px 14px;
      font-weight: 900;
      font-size: 15px;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 0 4px 0 var(--shadow);
      text-decoration: none;
    }
    .logo { font-family: Fredoka, sans-serif; font-weight: 700; font-size: 44px; text-align: center; }
    .logo .q { color: var(--accent); }
    .card {
      background: #FFFFFF;
      border: 3px solid var(--ink);
      border-radius: 24px;
      box-shadow: 0 8px 0 var(--shadow);
      padding: 24px;
    }
    .balance-card { text-align: center; display: flex; flex-direction: column; gap: 8px; }
    .balance-label { font-weight: 800; font-size: 15px; color: var(--muted); letter-spacing: 0.5px; }
    .balance { font-family: Fredoka, sans-serif; font-weight: 700; font-size: 56px; color: var(--green); }
    .balance-sub { font-weight: 700; font-size: 14px; color: var(--muted); }
    .pay-btn {
      margin-top: 8px;
      align-self: center;
      font-family: Fredoka, sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #FFFFFF;
      background: var(--accent);
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 12px 36px;
      cursor: pointer;
      box-shadow: 0 5px 0 var(--accent-dark);
    }
    .pay-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--accent-dark); }
    h2 { font-family: Fredoka, sans-serif; font-weight: 600; font-size: 22px; margin: 0 0 12px; }
    .row { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 2px solid var(--track); gap: 10px; }
    .row:last-child { border-bottom: none; }
    .row .name { font-weight: 800; font-size: 15px; }
    .row .game { font-weight: 700; font-size: 12px; color: var(--muted); display: block; }
    .row .when { font-weight: 700; font-size: 13px; color: var(--muted); white-space: nowrap; }
    .row .amt { font-family: Fredoka, sans-serif; font-weight: 600; font-size: 16px; color: var(--green); white-space: nowrap; }
    .row .amt.paid { color: var(--red); }
    .empty { font-weight: 700; color: var(--muted); }
    dialog {
      border: 3px solid var(--ink);
      border-radius: 20px;
      box-shadow: 0 8px 0 var(--shadow);
      padding: 24px;
      width: min(92vw, 360px);
      font-family: Nunito, sans-serif;
      color: var(--ink);
    }
    dialog::backdrop { background: rgba(40, 50, 78, 0.45); }
    dialog h3 { font-family: Fredoka, sans-serif; font-weight: 600; font-size: 22px; margin: 0 0 6px; }
    dialog p { font-weight: 700; font-size: 14px; color: var(--muted); margin: 0 0 14px; }
    dialog input {
      width: 100%;
      font-family: Fredoka, sans-serif;
      font-weight: 600;
      font-size: 26px;
      text-align: center;
      color: var(--ink);
      background: var(--bg);
      border: 3px solid var(--ink);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 14px;
    }
    dialog input:focus { outline: none; }
    .dlg-row { display: flex; gap: 10px; justify-content: flex-end; }
    .dlg-btn {
      font-family: Fredoka, sans-serif;
      font-weight: 600;
      font-size: 17px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      padding: 9px 22px;
      cursor: pointer;
    }
    .dlg-btn.ok { color: #FFFFFF; background: var(--green); box-shadow: 0 4px 0 var(--green-dark); }
    .dlg-btn.cancel { color: var(--ink); background: #FFFFFF; box-shadow: 0 4px 0 var(--shadow); }
    .dlg-err { font-weight: 800; font-size: 14px; color: var(--red); min-height: 18px; margin: -6px 0 8px; }
  </style>
</head>
<body>
  <main class="screen">
    <a class="back-btn" href="../">← Game Center</a>
    <div class="logo">💰 Quest <span class="q">Rewards</span></div>

    <div class="card balance-card">
      <span class="balance-label">DAD OWES</span>
      <span class="balance" id="balance">$0.00</span>
      <span class="balance-sub" id="balanceSub"></span>
      <button class="pay-btn" id="payBtn">Record a payment</button>
    </div>

    <div class="card">
      <h2>🏅 Units completed</h2>
      <div id="unitList"><span class="empty">No units completed yet — keep questing!</span></div>
    </div>

    <div class="card">
      <h2>💵 Payments</h2>
      <div id="payList"><span class="empty">No payments yet.</span></div>
    </div>
  </main>

  <dialog id="pinDialog">
    <h3 id="pinTitle">Grown-ups only</h3>
    <p id="pinMsg">Enter the 4-digit PIN.</p>
    <input id="pinInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" autocomplete="off">
    <div class="dlg-err" id="pinErr"></div>
    <div class="dlg-row">
      <button class="dlg-btn cancel" id="pinCancel">Cancel</button>
      <button class="dlg-btn ok" id="pinOk">OK</button>
    </div>
  </dialog>

  <dialog id="payDialog">
    <h3>Record a payment</h3>
    <p>How much did you pay? (dollars)</p>
    <input id="payInput" inputmode="decimal" placeholder="0.00" autocomplete="off">
    <div class="dlg-err" id="payErr"></div>
    <div class="dlg-row">
      <button class="dlg-btn cancel" id="payCancel">Cancel</button>
      <button class="dlg-btn ok" id="payOk">Save</button>
    </div>
  </dialog>

  <script src="../rewards-lib.js"></script>
  <script>
    'use strict';

    const MATH_NAMES = {
      add20: 'Addition to 20', sub20: 'Subtraction to 20', doubles: 'Doubles & Near Doubles',
      maketen: 'Make a Ten', missing: 'Missing Numbers', add100: 'Adding to 100',
      sub100: 'Subtracting to 100', place: 'Place Value', compare: 'Comparing Numbers',
      skip: 'Skip Counting', mental: 'Plus/Minus 10 & 100', evenodd: 'Even or Odd',
      story: 'Word Problems', big: 'Big Number Add & Sub'
    };
    const GRADE_NAMES = { g2: '2nd Grade', g3: '3rd Grade', g4: '4th Grade' };
    let SPELL_UNITS = [];

    function dollars(cents) { return '$' + (cents / 100).toFixed(2); }
    function when(ts) { return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); }

    function keyInfo(key) {
      const p = key.split(':');
      if (p[0] === 'times') return { game: 'Times Quest', name: '×' + p[1].slice(1) + ' table' };
      if (p[0] === 'spell') {
        const u = SPELL_UNITS[+p[1].slice(1)];
        return { game: 'Spell Quest', name: u ? u.name : 'Unit ' + (+p[1].slice(1) + 1) };
      }
      if (p[0] === 'math') return { game: 'Math Quest · ' + (GRADE_NAMES[p[1]] || p[1]), name: MATH_NAMES[p[2]] || p[2] };
      return { game: '', name: key };
    }

    function render() {
      const s = GCRewards.summary();
      document.getElementById('balance').textContent = dollars(Math.max(0, s.balanceCents));
      document.getElementById('balanceSub').textContent =
        `earned ${dollars(s.earnedCents)} · paid ${dollars(s.paidCents)}`;

      const entries = Object.entries(s.awarded).sort((a, b) => b[1] - a[1]);
      if (entries.length) {
        document.getElementById('unitList').innerHTML = entries.map(([k, ts]) => {
          const info = keyInfo(k);
          return `<div class="row">
            <span class="name">${info.name}<span class="game">${info.game}</span></span>
            <span class="when">${when(ts)}</span>
            <span class="amt">+${GCRewards.CENTS_PER_UNIT}¢</span>
          </div>`;
        }).join('');
      }

      if (s.payments.length) {
        document.getElementById('payList').innerHTML = [...s.payments].reverse().map(p =>
          `<div class="row">
            <span class="name">Paid by Dad</span>
            <span class="when">${when(p.ts)}</span>
            <span class="amt paid">−${dollars(p.cents)}</span>
          </div>`).join('');
      }
    }

    /* --- PIN + payment flow --- */
    const pinDialog = document.getElementById('pinDialog');
    const payDialog = document.getElementById('payDialog');

    function askPin() {
      return new Promise(resolve => {
        const first = !GCRewards.hasPin();
        document.getElementById('pinTitle').textContent = first ? 'Set a parent PIN' : 'Grown-ups only';
        document.getElementById('pinMsg').textContent = first
          ? 'Choose a 4-digit PIN. You’ll need it to record payments.'
          : 'Enter the 4-digit PIN.';
        const input = document.getElementById('pinInput');
        const err = document.getElementById('pinErr');
        input.value = ''; err.textContent = '';
        pinDialog.showModal();
        setTimeout(() => input.focus(), 50);

        const done = ok => { pinDialog.close(); cleanup(); resolve(ok); };
        const onOk = async () => {
          const pin = input.value.trim();
          if (!/^\d{4}$/.test(pin)) { err.textContent = 'PIN must be 4 digits.'; return; }
          if (first) { await GCRewards.setPin(pin); done(true); return; }
          if (await GCRewards.verifyPin(pin)) { done(true); }
          else { err.textContent = 'Wrong PIN.'; input.value = ''; input.focus(); }
        };
        const onCancel = () => done(false);
        function cleanup() {
          document.getElementById('pinOk').removeEventListener('click', onOk);
          document.getElementById('pinCancel').removeEventListener('click', onCancel);
        }
        document.getElementById('pinOk').addEventListener('click', onOk);
        document.getElementById('pinCancel').addEventListener('click', onCancel);
      });
    }

    document.getElementById('payBtn').addEventListener('click', async () => {
      if (!await askPin()) return;
      const s = GCRewards.summary();
      const input = document.getElementById('payInput');
      const err = document.getElementById('payErr');
      input.value = (Math.max(0, s.balanceCents) / 100).toFixed(2);
      err.textContent = '';
      payDialog.showModal();
      setTimeout(() => input.focus(), 50);

      const done = () => { payDialog.close(); cleanup(); };
      const onOk = () => {
        const cents = Math.round(parseFloat(input.value) * 100);
        if (isNaN(cents) || cents <= 0) { err.textContent = 'Enter an amount above zero.'; return; }
        GCRewards.recordPayment(cents);
        done();
        render();
      };
      const onCancel = done;
      function cleanup() {
        document.getElementById('payOk').removeEventListener('click', onOk);
        document.getElementById('payCancel').removeEventListener('click', onCancel);
      }
      document.getElementById('payOk').addEventListener('click', onOk);
      document.getElementById('payCancel').addEventListener('click', onCancel);
    });

    /* --- bootstrap --- */
    fetch('../spell-quest/word-list.json')
      .then(r => r.json())
      .then(d => { SPELL_UNITS = d; render(); })
      .catch(() => render());
    render();
  </script>
</body>
</html>
